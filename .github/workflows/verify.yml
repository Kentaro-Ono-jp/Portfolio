name: Verify

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pull-requests: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Web and service-boundary repository checks
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Plan selective verification
        id: plan
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: python3 scripts/plan_ci.py

      - name: Install pnpm
        if: steps.plan.outputs.needs_node == 'true'
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        if: steps.plan.outputs.needs_node == 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Python
        if: steps.plan.outputs.needs_python == 'true'
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install uv
        if: steps.plan.outputs.needs_uv == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          version: 0.11.29
          enable-cache: true
          cache-dependency-glob: |
            apps/api/uv.lock
            apps/ml/uv.lock

      - name: Install pinned dependencies
        if: steps.plan.outputs.needs_node == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install pinned API dependencies
        if: steps.plan.outputs.needs_api == 'true'
        run: uv sync --project apps/api --frozen

      - name: Install pinned ML dependencies
        if: steps.plan.outputs.needs_ml == 'true'
        run: uv sync --project apps/ml --frozen

      - name: Install pinned Playwright browser
        if: steps.plan.outputs.needs_e2e == 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Run canonical verification
        if: steps.plan.outputs.has_execution == 'true'
        shell: bash
        env:
          SELECTED_GROUPS: ${{ steps.plan.outputs.groups }}
          CARRIED_GROUPS: ${{ steps.plan.outputs.carried_groups }}
        run: |
          arguments=(--groups "$SELECTED_GROUPS")
          if [[ -n "$CARRIED_GROUPS" ]]; then
            arguments+=(--carried-groups "$CARRIED_GROUPS" --baseline-proven)
          fi
          python scripts/verify.py "${arguments[@]}"

      - name: Upload failure evidence
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: verify-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/verification
          if-no-files-found: warn
          retention-days: 14

      - name: Tear down the isolated Compose project
        if: always() && steps.plan.outputs.needs_runtime == 'true'
        run: >-
          docker compose -p reactorfront-portfolio down
          --remove-orphans --volumes
