name: Verify

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: API outbox boundary and repository checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: 0.11.29
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock

      - name: Install pinned dependencies
        run: pnpm install --frozen-lockfile

      - name: Install pinned API dependencies
        run: uv sync --project apps/api --frozen

      - name: Run canonical verification
        run: python scripts/verify.py

      - name: Upload failure evidence
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: verify-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/verification
          if-no-files-found: warn
          retention-days: 14

      - name: Tear down the isolated Compose project
        if: always()
        run: >-
          docker compose -p reactorfront-portfolio down
          --remove-orphans --volumes
