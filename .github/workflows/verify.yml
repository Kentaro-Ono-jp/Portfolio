name: Verify

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pull-requests: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Web and service-boundary repository checks
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Plan selective verification
        id: plan
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          latest_run_succeeded() {
            local candidate_sha="$1"
            local conclusion
            conclusion="$(gh api --method GET \
              "repos/$REPOSITORY/actions/workflows/verify.yml/runs" \
              -f head_sha="$candidate_sha" -f per_page=1 \
              --jq '.workflow_runs[0].conclusion // ""')" || return 1
            [[ "$conclusion" == "success" ]]
          }

          trailer_value() {
            local candidate_sha="$1"
            local key="$2"
            if git cat-file -e "$candidate_sha^{commit}" 2>/dev/null; then
              git show -s --format=%B "$candidate_sha"
            else
              gh api "repos/$REPOSITORY/commits/$candidate_sha" \
                --jq '.commit.message'
            fi |
              git interpret-trailers --parse |
              sed -n "s/^$key: //p" |
              tail -n 1
          }

          stop_without_docker() {
            local message="$1"
            printf '## Selective verification stopped\n\n- %s\n' "$message" \
              >> "$GITHUB_STEP_SUMMARY"
            echo "::error::$message"
            exit 1
          }

          plan_arguments=(--plan)
          base_reason=""
          skip_request=""

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            if [[ "$EVENT_ACTION" == "synchronize" && -n "$BEFORE_SHA" ]]; then
              base="$BEFORE_SHA"
              base_reason="previous PR head"
            else
              base="$PR_BASE_SHA"
              base_reason="PR base"
            fi

            if ! latest_run_succeeded "$base"; then
              stop_without_docker \
                "$base_reason $base lacks a latest successful Verify run; no checks or Docker were started."
            fi
            plan_arguments+=(--base "$base" --baseline-proven)

            if [[ "$PR_AUTHOR" == "$REPOSITORY_OWNER" ]]; then
              skip_request="$(trailer_value "$PR_HEAD_SHA" "Verification-Skip")"
            fi
          elif [[ "$EVENT_NAME" == "push" ]]; then
            merged_pr="$(gh api --method GET \
              "repos/$REPOSITORY/commits/$CURRENT_SHA/pulls" \
              --jq '[.[] | select(.merged_at != null and .base.ref == "main")][0] | if . == null then "" else [.number, .head.sha, .user.login] | @tsv end' \
              2>/dev/null || true)"
            IFS=$'\t' read -r _pr_number pr_head pr_author <<< "$merged_pr"
            if [[ -n "$pr_head" ]]; then
              current_tree="$(git rev-parse 'HEAD^{tree}')"
              pr_tree="$(gh api "repos/$REPOSITORY/git/commits/$pr_head" \
                --jq '.tree.sha' 2>/dev/null || true)"
              if [[ -n "$pr_tree" && "$current_tree" == "$pr_tree" ]] && \
                latest_run_succeeded "$pr_head"; then
                plan_arguments+=(--carry-all --baseline-proven)
                base_reason="tree-identical successful PR head $pr_head"
                if [[ "$pr_author" == "$REPOSITORY_OWNER" ]]; then
                  skip_request="$(trailer_value \
                    "$pr_head" "Verification-Skip")"
                fi
              fi
            fi

            if [[ ${#plan_arguments[@]} -eq 1 ]]; then
              if [[ -z "$BEFORE_SHA" || "$BEFORE_SHA" =~ ^0+$ ]]; then
                stop_without_docker \
                  "main push has no usable baseline; no checks or Docker were started."
              fi
              if ! latest_run_succeeded "$BEFORE_SHA"; then
                stop_without_docker \
                  "main baseline $BEFORE_SHA lacks a latest successful Verify run; no checks or Docker were started."
              fi
              plan_arguments+=(--base "$BEFORE_SHA" --baseline-proven)
              base_reason="successful main baseline $BEFORE_SHA"
              if [[ "$ACTOR" == "$REPOSITORY_OWNER" ]]; then
                skip_request="$(trailer_value \
                  "$CURRENT_SHA" "Verification-Skip")"
              fi
            fi
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            plan_arguments+=(--full)
            base_reason="owner-dispatched full verification"
          else
            stop_without_docker "unsupported workflow event $EVENT_NAME"
          fi

          if [[ -n "$skip_request" ]]; then
            plan_arguments+=(--skipped-groups "$skip_request")
          fi
          python3 scripts/verify.py "${plan_arguments[@]}" \
            --github-output "$GITHUB_OUTPUT" --summary "$GITHUB_STEP_SUMMARY"
          printf '\n- Selection baseline: %s\n' "$base_reason" >> "$GITHUB_STEP_SUMMARY"

      - name: Install pnpm
        if: steps.plan.outputs.needs_node == 'true'
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        if: steps.plan.outputs.needs_node == 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Python
        if: steps.plan.outputs.needs_python == 'true'
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install uv
        if: steps.plan.outputs.needs_uv == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          version: 0.11.29
          enable-cache: true
          cache-dependency-glob: |
            apps/api/uv.lock
            apps/ml/uv.lock

      - name: Install pinned dependencies
        if: steps.plan.outputs.needs_node == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install pinned API dependencies
        if: steps.plan.outputs.needs_api == 'true'
        run: uv sync --project apps/api --frozen

      - name: Install pinned ML dependencies
        if: steps.plan.outputs.needs_ml == 'true'
        run: uv sync --project apps/ml --frozen

      - name: Run canonical verification
        if: steps.plan.outputs.has_execution == 'true'
        run: >-
          python scripts/verify.py
          --groups "${{ steps.plan.outputs.groups }}"
          --carried-groups "${{ steps.plan.outputs.carried_groups }}"

      - name: Upload failure evidence
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: verify-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/verification
          if-no-files-found: warn
          retention-days: 14

      - name: Tear down the isolated Compose project
        if: always() && steps.plan.outputs.needs_runtime == 'true'
        run: >-
          docker compose -p reactorfront-portfolio down
          --remove-orphans --volumes
